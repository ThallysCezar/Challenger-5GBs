services:
  postgres:
    image: postgres:16-alpine            
    container_name: challenger-postgres
    environment:
      POSTGRES_DB: uploaddb               
      POSTGRES_USER: user                 
      POSTGRES_PASSWORD: pass             
    ports:
      - "5435:5432"                       
    volumes:
      - postgres_data:/var/lib/postgresql/data   
    healthcheck:                          
      test: ["CMD-SHELL", "pg_isready -U user -d uploaddb"]
      interval: 5s
      timeout: 3s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: challenger-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin         
      MINIO_ROOT_PASSWORD: minioadmin     
    ports:
      - "9100:9000"                       
      - "9101:9001"                       
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # createbuckets — container "one-shot" que cria o bucket "uploads" no MinIO
  # e morre. É um truque comum em docker-compose pra inicialização de dados.
  # Sem isso, você teria que abrir o console e criar o bucket na mão toda vez.
  # --------------------------------------------------------------------------
  createbuckets:
    image: minio/mc:latest                
    container_name: challenger-createbuckets
    depends_on:
      minio:
        condition: service_healthy        
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/uploads;
      mc anonymous set download local/uploads;
      echo 'Bucket uploads criado e pronto.';
      exit 0;
      "
  rabbitmq:
    image: rabbitmq:3-management-alpine   
    container_name: challenger-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest        
      RABBITMQ_DEFAULT_PASS: guest        
    ports:
      - "5672:5672"                       
      - "15672:15672"                     
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: challenger-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  redis_data: