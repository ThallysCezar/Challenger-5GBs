spring.application.name=Desafio-para-aprendizado

# ============================================================
# BANCO DE DADOS
# ============================================================

spring.datasource.url=jdbc:postgresql://localhost:5435/uploaddb
spring.datasource.username=user
spring.datasource.password=pass

# ============================================================
# JPA / HIBERNATE
# ============================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# MULTIPART (tamanho dos chunks)
# ============================================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
# ?? 15MB porque o chunk e 10MB + margem pros headers HTTP

# ============================================================
# MINIO
# ============================================================
minio.endpoint=http://localhost:9100
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=uploads

# ============================================================
# UPLOAD TEMP
# ============================================================
upload.temp-dir=C:/tmp/uploads

# ============================================================
# RABBITMQ
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue=chunks-complete-queue
rabbitmq.exchange=upload-exchange
rabbitmq.routing-key=upload.complete

# ============================================================
# REDIS
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms