spring.application.name=Desafio-para-aprendizado

# ============================================================
# BANCO DE DADOS
# ============================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/uploaddb
spring.datasource.username=user
spring.datasource.password=pass

# ============================================================
# JPA / HIBERNATE
# ============================================================

spring.jpa.hibernate.ddl-auto=update
# update ? cria/atualiza tabelas automaticamente (só use em dev!)
# create-drop ? recria do zero a cada restart (cuidado, apaga dados!)
# validate ? so valida, nao mexe no banco (ideal pra produçăo)
# none ? nao faz nada

spring.jpa.show-sql=true
# Mostra o SQL gerado no console ? otimo pra aprender o que o JPA faz por baixo

spring.jpa.properties.hibernate.format_sql=true
# Formata o SQL no console pra ficar legivel (sem isso fica tudo numa linha)

# ============================================================
# MULTIPART (tamanho dos chunks)
# ============================================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
# ?? 15MB porque o chunk e 10MB + margem pros headers HTTP

# ============================================================
# MINIO
# ============================================================
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=uploads

# ============================================================
# UPLOAD TEMP
# ============================================================
upload.temp-dir=C:/tmp/uploads
# Diretorio temporario onde os chunks ficam antes de ir pro MinIO
# No Windows troque por: upload.temp-dir=C:/tmp/uploads

# ============================================================
# RABBITMQ
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Nomes da fila e exchange ? centralizados aqui pra nao ter string solta no codigo
rabbitmq.queue=chunks-complete-queue
rabbitmq.exchange=upload-exchange
rabbitmq.routing-key=upload.complete

# ============================================================
# REDIS
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
# ? Em Spring Boot 4 o prefixo e "spring.data.redis", nao "spring.redis".
#   Senha vazia = sem auth (OK em dev local).